spring:
  application:
    name: Sellvia
    profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:local_sellvia_db}
    driverClassName: org.postgresql.Driver
    username: ${DB_USERNAME:adm_local}
    password: ${DB_PASSWORD:adm_local}
  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate

jwt:
  secret: ${JWT_SECRET:secret-temporaria}
  token-expiration: ${JWT_TOKEN_EXPIRATION:18000000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

cloudflare-r2:
  account-id: ${CLOUDFLARE_R2_ACCOUNT_ID}
  secret-key: ${CLOUDFLARE_R2_ACCESS_KEY}
  access-key: ${CLOUDFLARE_R2_SECRET_KEY}
  bucket-name: ${CLOUDFLARE_R2_BUCKET_NAME}

logging:
  level:
    software.amazon.awssdk: DEBUG