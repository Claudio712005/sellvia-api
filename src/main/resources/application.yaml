spring:
  application:
    name: Sellvia
    profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:claus}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:claus}
    user: ${FLYWAY_USER}
    password: ${FLYWAY_PASSWORD}
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas:
      - ${MAIN_APP_SCHEMA:sellvia}

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        discriminator:
          ignore_explicit_for_joined: true

jwt:
  secret: ${JWT_SECRET:secret-temporaria}
  token-expiration: ${JWT_TOKEN_EXPIRATION:18000000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

cloudflare-r2:
  account-id: ${CLOUDFLARE_R2_ACCOUNT_ID:dummy}
  secret-key: ${CLOUDFLARE_R2_ACCESS_KEY:dummy}
  access-key: ${CLOUDFLARE_R2_SECRET_KEY:dummy}
  bucket-name: ${CLOUDFLARE_R2_BUCKET_NAME:dummy}

logging:
  level:
    software.amazon.awssdk: DEBUG