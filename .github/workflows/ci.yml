name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  actions: write
  contents: read

jobs:

  lint:
    name: Code Quality (KtLint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Run KtLint
        run: ./gradlew ktlintCheck


  build-and-test:
    name: Build, Test and Coverage
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build, Test and Verify Coverage
        run: ./gradlew build jacocoTestCoverageVerification jacocoTestReport

      - name: Upload Jacoco HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/
          retention-days: 7


  validate-migrations:
    name: Validate Flyway Migrations
    needs: build-and-test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: sellvia_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres
          do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Validate Flyway migrations
        run: ./gradlew flywayMigrate flywayValidate
        env:
          MAIN_APP_SCHEMA: sellvia
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: sellvia_test
          FLYWAY_USER: postgres
          FLYWAY_PASSWORD: postgres


  trigger-cd:
    name: Trigger Docker Publish
    needs: validate-migrations
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger docker publish workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-publish.yml',
              ref: 'homolog'
            })
